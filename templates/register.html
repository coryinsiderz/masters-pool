{% extends "base.html" %}

{% block title %}Register - Baltz Masters Pool{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Register</h1>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="username">Name</label>
            <input type="text" id="username" name="username" placeholder="First L." required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="any" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Please remember" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="recovery_contact">Recovery</label>
            <input type="text" id="recovery_contact" name="recovery_contact" placeholder="PIN aka second password" autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}
