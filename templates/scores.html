{% extends "base.html" %}

{% block title %}Live Scores - Baltz Masters Pool{% endblock %}

{% block content %}
<div class="page-container">
    <h1>Live Tournament Scores</h1>
    <table class="data-table">
        <thead>
            <tr>
                <th>Pos</th>
                <th>Player</th>
                <th>To Par</th>
                <th>Thru</th>
                <th>R1</th>
                <th>R2</th>
                <th>R3</th>
                <th>R4</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="9" class="empty-state">Scores will appear once the tournament begins.</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
