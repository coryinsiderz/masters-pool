{% extends "base.html" %}

{% block title %}Projections{% endblock %}

{% block content %}
<div class="page-container">
    <h1>#model</h1>

    <div class="toggle-row proj-tabs">
        <button class="filter-btn active" id="tab-justme">Just Me</button>
        <button class="filter-btn" id="tab-everyone">Everyone</button>
        <div class="custom-dropdown team-viewer-dropdown" id="chosen-dropdown">
            <div class="custom-dropdown-trigger filter-btn" id="chosen-trigger">
                <span class="dd-text">Chosen Ones</span>
            </div>
            <div class="custom-dropdown-options" id="chosen-options">
                {% for e in entrants %}
                <div class="custom-dropdown-option chosen-option">
                    <label class="chosen-label">
                        <input type="checkbox" class="chosen-cb" value="{{ e.user_id }}">
                        <span>{{ e.name }}</span>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="proj-layout" id="chart-wrap">
        <div class="proj-chart-wrap">
            <canvas id="projections-chart"></canvas>
        </div>
        <div class="proj-legend" id="proj-legend"></div>
    </div>

    <p class="empty-state" id="proj-empty" style="display:none">No projection data yet. Check back once the tournament begins.</p>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script>
var CURRENT_USER_ID = {{ current_user.id }};
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    var tabEveryone = document.getElementById("tab-everyone");
    var tabJustMe = document.getElementById("tab-justme");
    var chosenDropdown = document.getElementById("chosen-dropdown");
    var chosenTrigger = document.getElementById("chosen-trigger");
    var chosenOptions = document.getElementById("chosen-options");
    var ddText = chosenTrigger.querySelector(".dd-text");
    var chartWrap = document.getElementById("chart-wrap");
    var emptyState = document.getElementById("proj-empty");

    var chart = null;
    var allData = null;
    var activeTab = "justme";

    // Tournament window: Thu Apr 9 7:30 AM ET to Sun Apr 12 7:00 PM ET (2026)
    // ET = UTC-4 during EDT
    var TOURNEY_START = new Date("2026-04-09T07:30:00-04:00").getTime();
    var TOURNEY_END = new Date("2026-04-12T19:00:00-04:00").getTime();
    var chosenUserIds = {};
    var legendSort = "score"; // "score" or "name"
    var legendSortAsc = true;  // true = best first for score, A-Z for name

    // --- Tab switching ---
    function setTab(tab) {
        activeTab = tab;
        tabJustMe.classList.toggle("active", tab === "justme");
        tabEveryone.classList.toggle("active", tab === "everyone");
        chosenTrigger.classList.toggle("active", tab === "chosen");
        if (tab !== "chosen") {
            chosenDropdown.classList.remove("open");
        }
        updateChart();
    }

    tabJustMe.addEventListener("click", function () { setTab("justme"); });
    tabEveryone.addEventListener("click", function () { setTab("everyone"); });

    // app.js handles dropdown open/close; we only manage tab state
    chosenTrigger.addEventListener("click", function () {
        if (activeTab !== "chosen") {
            setTab("chosen");
        }
    });

    // --- Bind chosen-ones checkboxes (server-rendered) ---
    chosenOptions.querySelectorAll(".chosen-cb").forEach(function (cb) {
        cb.addEventListener("change", function () {
            var uid = parseInt(cb.value);
            if (cb.checked) {
                chosenUserIds[uid] = true;
            } else {
                delete chosenUserIds[uid];
            }
            updateChosenCount();
            updateChart();
        });
    });

    // --- Fetch data ---
    fetch("/api/projections/history")
        .then(function (r) { return r.json(); })
        .then(function (data) {
            allData = data;
            if (!data.snapshots || data.snapshots.length === 0) {
                chartWrap.style.display = "none";
                emptyState.style.display = "";
                return;
            }
            buildChart(data);
            updateLegend();
        })
        .catch(function () {
            chartWrap.style.display = "none";
            emptyState.style.display = "";
        });

    function updateChosenCount() {
        var count = Object.keys(chosenUserIds).length;
        if (count === 0) {
            ddText.textContent = "Chosen Ones";
        } else {
            ddText.textContent = "Chosen Ones (" + count + ")";
        }
    }

    // --- "Live" line plugin ---
    var liveLinePlugin = {
        id: "liveLine",
        afterDraw: function (chart) {
            var now = Date.now();
            if (now <= TOURNEY_START || now >= TOURNEY_END) return;

            var xScale = chart.scales.x;
            var xPx = xScale.getPixelForValue(now);
            var yTop = chart.scales.y.top;
            var yBot = chart.scales.y.bottom;

            var ctx = chart.ctx;
            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = "rgba(200, 169, 81, 0.2)";
            ctx.lineWidth = 1;
            ctx.moveTo(xPx, yTop);
            ctx.lineTo(xPx, yBot);
            ctx.stroke();

            // "Live" label inside chart area
            ctx.fillStyle = "rgba(255, 248, 231, 0.4)";
            ctx.font = "9px 'Libre Baskerville', Georgia, serif";
            ctx.textAlign = "center";
            ctx.fillText("Live", xPx, yTop + 12);
            ctx.restore();
        }
    };

    // --- Chart ---
    function buildChart(data) {
        var snapshots = data.snapshots;

        // Collect all user IDs across snapshots
        var userMap = {};
        snapshots.forEach(function (snap) {
            snap.teams.forEach(function (t) {
                if (!userMap[t.user_id]) {
                    userMap[t.user_id] = { name: t.name, data: [] };
                }
            });
        });

        // Build {x: timestamp, y: value} data points per user
        var userIds = Object.keys(userMap);
        snapshots.forEach(function (snap) {
            var ts = new Date(snap.snapshot_time).getTime();
            var teamMap = {};
            snap.teams.forEach(function (t) { teamMap[t.user_id] = t.projected_total; });
            userIds.forEach(function (uid) {
                var val = teamMap[uid] !== undefined ? teamMap[uid] : null;
                if (val !== null) {
                    userMap[uid].data.push({ x: ts, y: val });
                }
            });
        });

        var datasets = [];
        userIds.forEach(function (uid) {
            var u = userMap[uid];
            var isMe = parseInt(uid) === data.current_user_id;
            datasets.push({
                label: u.name,
                data: u.data,
                userId: parseInt(uid),
                borderColor: isMe ? "#C8A951" : "rgba(255, 248, 231, 0.25)",
                borderWidth: isMe ? 3 : 1,
                pointRadius: 0,
                pointHoverRadius: 0,
                pointHitRadius: 12,
                pointBackgroundColor: "transparent",
                pointBorderColor: "transparent",
                fill: false,
                tension: 0.3,
                order: isMe ? 0 : 1,
                hidden: !isMe,
            });
        });

        var ctx = document.getElementById("projections-chart").getContext("2d");
        chart = new Chart(ctx, {
            type: "line",
            data: { datasets: datasets },
            plugins: [liveLinePlugin],
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: "nearest",
                        intersect: false,
                        callbacks: {
                            title: function (items) {
                                if (!items.length) return "";
                                var ts = items[0].parsed.x;
                                var d = new Date(ts);
                                var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
                                var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                                var h = d.getHours();
                                var ampm = h >= 12 ? "pm" : "am";
                                h = h % 12 || 12;
                                var min = d.getMinutes();
                                var minStr = min < 10 ? "0" + min : String(min);
                                return days[d.getDay()] + " " + months[d.getMonth()] + " " + d.getDate() + ", " + h + ":" + minStr + ampm;
                            },
                            label: function (ctx) {
                                var val = ctx.parsed.y;
                                var name = ctx.dataset.label;
                                var formatted = val === 0 ? "E" : (val > 0 ? "+" + val.toFixed(1) : val.toFixed(1));
                                // Rank at this snapshot
                                var ts = ctx.parsed.x;
                                var allVals = [];
                                chart.data.datasets.forEach(function (d) {
                                    d.data.forEach(function (pt) {
                                        if (pt.x === ts) allVals.push(pt.y);
                                    });
                                });
                                allVals.sort(function (a, b) { return a - b; });
                                var rank = allVals.indexOf(val) + 1;
                                return name + ": " + formatted + " (" + ordinal(rank) + ")";
                            }
                        },
                        backgroundColor: "rgba(0, 30, 20, 0.92)",
                        titleColor: "#C8A951",
                        bodyColor: "#FFF8E7",
                        borderColor: "rgba(200, 169, 81, 0.4)",
                        borderWidth: 1,
                        titleFont: { family: "'Libre Baskerville', Georgia, serif", size: 12 },
                        bodyFont: { family: "'Libre Baskerville', Georgia, serif", size: 12 },
                    }
                },
                scales: {
                    x: {
                        type: "time",
                        display: false,
                        min: TOURNEY_START,
                        max: TOURNEY_END,
                    },
                    y: {
                        reverse: true,
                        ticks: {
                            color: "#FFF8E7",
                            font: { family: "'Libre Baskerville', Georgia, serif", size: 11 },
                            callback: function (val) {
                                if (val === 0) return "E";
                                return val > 0 ? "+" + val : String(val);
                            }
                        },
                        grid: { display: false },
                        title: {
                            display: true,
                            text: "Projected To Par",
                            color: "#FFF8E7",
                            font: { family: "'Cormorant Garamond', Georgia, serif", size: 14, weight: 600 },
                        }
                    }
                }
            }
        });
    }

    function updateChart() {
        if (!chart) return;
        chart.data.datasets.forEach(function (ds) {
            var isMe = ds.userId === CURRENT_USER_ID;
            if (activeTab === "justme") {
                ds.hidden = !isMe;
                ds.borderColor = isMe ? "#C8A951" : "rgba(255, 248, 231, 0.25)";
                ds.borderWidth = isMe ? 3 : 1;
            } else if (activeTab === "chosen") {
                var isChosen = !!chosenUserIds[ds.userId];
                ds.hidden = false;
                if (isMe) {
                    ds.borderColor = "#C8A951";
                    ds.borderWidth = 3;
                } else if (isChosen) {
                    ds.borderColor = "rgba(255, 248, 231, 0.7)";
                    ds.borderWidth = 2;
                } else {
                    ds.borderColor = "rgba(255, 248, 231, 0.15)";
                    ds.borderWidth = 1;
                }
            } else {
                ds.hidden = false;
                ds.borderColor = isMe ? "#C8A951" : "rgba(255, 248, 231, 0.25)";
                ds.borderWidth = isMe ? 3 : 1;
            }
            // Always no dots
            ds.pointRadius = 0;
            ds.pointHoverRadius = 0;
        });
        chart.update();
        updateLegend();
    }

    // --- Legend ---
    function updateLegend() {
        var legend = document.getElementById("proj-legend");
        if (!chart) { legend.innerHTML = ""; return; }

        // Collect visible datasets
        var entries = [];
        chart.data.datasets.forEach(function (ds) {
            if (ds.hidden) return;
            var isMe = ds.userId === CURRENT_USER_ID;
            var isChosen = !!chosenUserIds[ds.userId];
            var lastVal = null;
            for (var i = ds.data.length - 1; i >= 0; i--) {
                var pt = ds.data[i];
                if (pt && pt.y !== null && pt.y !== undefined) {
                    lastVal = pt.y;
                    break;
                }
            }
            entries.push({
                name: ds.label,
                val: lastVal,
                color: ds.borderColor,
                isMe: isMe,
                isChosen: isChosen,
                userId: ds.userId,
            });
        });

        // Sort function
        function sortEntries(arr) {
            arr.sort(function (a, b) {
                if (legendSort === "name") {
                    var cmp = a.name.localeCompare(b.name);
                    return legendSortAsc ? cmp : -cmp;
                }
                // score sort
                if (a.val === null && b.val === null) return 0;
                if (a.val === null) return 1;
                if (b.val === null) return -1;
                return legendSortAsc ? a.val - b.val : b.val - a.val;
            });
        }

        var html = "";

        // Header row
        html += '<div class="pl-header">';
        html += '<span class="pl-hdr-name' + (legendSort === "name" ? ' pl-hdr-active' : '') + '" id="pl-sort-name">Name</span>';
        html += '<span class="pl-hdr-score' + (legendSort === "score" ? ' pl-hdr-active' : '') + '" id="pl-sort-score">Proj</span>';
        html += '</div>';

        // In Chosen Ones mode: split into chosen+me vs others
        if (activeTab === "chosen") {
            var chosenGroup = [];
            var otherGroup = [];
            entries.forEach(function (e) {
                if (e.isMe || e.isChosen) {
                    chosenGroup.push(e);
                } else {
                    otherGroup.push(e);
                }
            });
            sortEntries(chosenGroup);
            sortEntries(otherGroup);

            chosenGroup.forEach(function (e) { html += renderEntry(e); });
            if (chosenGroup.length > 0 && otherGroup.length > 0) {
                html += '<div class="pl-divider"></div>';
            }
            otherGroup.forEach(function (e) { html += renderEntry(e); });
        } else {
            sortEntries(entries);
            entries.forEach(function (e) { html += renderEntry(e); });
        }

        legend.innerHTML = html;

        // Bind sort header clicks
        var sortName = document.getElementById("pl-sort-name");
        var sortScore = document.getElementById("pl-sort-score");
        if (sortName) sortName.addEventListener("click", function () {
            if (legendSort === "name") { legendSortAsc = !legendSortAsc; }
            else { legendSort = "name"; legendSortAsc = true; }
            updateLegend();
        });
        if (sortScore) sortScore.addEventListener("click", function () {
            if (legendSort === "score") { legendSortAsc = !legendSortAsc; }
            else { legendSort = "score"; legendSortAsc = true; }
            updateLegend();
        });
    }

    function renderEntry(e) {
        var formatted = formatScore(e.val);
        var nameClass = e.isMe ? "pl-name pl-me" : "pl-name";
        var html = '<div class="pl-entry">';
        html += '<span class="pl-line" style="background:' + e.color + '"></span>';
        html += '<span class="' + nameClass + '">' + esc(e.name) + '</span>';
        html += '<span class="pl-score">' + formatted + '</span>';
        html += '</div>';
        return html;
    }

    function formatScore(val) {
        if (val === null) return "--";
        if (val === 0) return "E";
        if (val > 0) return "+" + val.toFixed(1);
        return val.toFixed(1);
    }

    function esc(str) {
        if (str === null || str === undefined) return "--";
        var d = document.createElement("div");
        d.textContent = String(str);
        return d.innerHTML;
    }

    function formatTime(isoStr) {
        if (!isoStr) return "";
        var d = new Date(isoStr);
        var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        var h = d.getHours();
        var ampm = h >= 12 ? "pm" : "am";
        h = h % 12 || 12;
        return days[d.getDay()] + " " + h + ampm;
    }

    function ordinal(n) {
        if (n % 100 >= 11 && n % 100 <= 13) return n + "th";
        switch (n % 10) {
            case 1: return n + "st";
            case 2: return n + "nd";
            case 3: return n + "rd";
            default: return n + "th";
        }
    }
});
</script>
{% endblock %}
